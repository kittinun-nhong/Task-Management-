<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div ref="{{ rootRef }}" style="position:relative; width:100%; font-family:'IBM Plex Sans Thai','Inter',system-ui,sans-serif;">
  <div onClick="{{ toggle }}" style="border:1px solid {{ borderColor }}; border-radius:{{ radius }}px; padding:{{ pad }}; font-size:{{ fs }}px; color:{{ valColor }}; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px;">
    <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ display }}</span>
    <svg style="flex:0 0 auto; transform:{{ rot }}; transition:transform .15s;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9AA1B2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:60; background:#fff; border:1px solid #E8EAF1; border-radius:11px; box-shadow:0 12px 30px rgba(20,24,40,.16); padding:5px; max-height:248px; overflow:auto;">
      <sc-for list="{{ opts }}" as="o" hint-placeholder-count="4">
        <div onClick="{{ o.pick }}" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px; border-radius:8px; font-size:{{ fs }}px; font-weight:{{ o.weight }}; color:{{ o.color }}; cursor:pointer; background:{{ o.bg }};" style-hover="background:#F4F5F9;">
          <span>{{ o.label }}</span>
          <sc-if value="{{ o.selected }}" hint-placeholder-val="{{ false }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="{{ accent }}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:46},&quot;options&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ทั้งหมด|กำลังดำเนินการ|รอทบทวน&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ทั้งหมด&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6C5DD3&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;radius&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10,&quot;tsType&quot;:&quot;number&quot;},&quot;pad&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;11px 14px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fontSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:13,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  rootRef = React.createRef();
  state = { open: false, value: undefined };

  componentDidMount() {
    this._h = (e) => {
      if (this.rootRef.current && !this.rootRef.current.contains(e.target)) {
        this.setState({ open: false });
      }
    };
    document.addEventListener('mousedown', this._h);
  }
  componentWillUnmount() {
    if (this._h) document.removeEventListener('mousedown', this._h);
  }

  renderVals() {
    const accent = this.props.accent || '#6C5DD3';
    const list = (this.props.options || '').split('|').filter(Boolean);
    const hasVal = this.state.value !== undefined;
    const value = hasVal ? this.state.value : (this.props.value || '');
    const placeholder = this.props.placeholder || '';
    return {
      accent,
      display: value || placeholder,
      valColor: value ? '#1B2138' : '#9AA1B2',
      borderColor: this.state.open ? accent : '#E1E4ED',
      open: this.state.open,
      radius: this.props.radius || 10,
      pad: this.props.pad || '11px 14px',
      fs: this.props.fontSize || 13,
      rot: this.state.open ? 'rotate(180deg)' : 'rotate(0deg)',
      rootRef: this.rootRef,
      toggle: () => this.setState((s) => ({ open: !s.open })),
      opts: list.map((o) => ({
        label: o,
        selected: o === value,
        weight: o === value ? 600 : 500,
        color: o === value ? accent : '#4B5468',
        bg: o === value ? (accent + '12') : 'transparent',
        pick: () => this.setState({ value: o, open: false }),
      })),
    };
  }
}
</script>
</body>
</html>
